<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동부축산유통 주문서</title>
<style>
:root { --red:#c0392b; --red2:#a93226; --bg:#f5f5f5; --card:#fff; --border:#eee; --text:#222; --muted:#888; }
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:15px;}

/* ── 공통 ── */
.page{max-width:600px;margin:0 auto;padding:20px 16px 80px;}
.hidden{display:none!important;}
h1{font-size:20px;font-weight:700;margin-bottom:4px;}
.sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.section-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid var(--border);}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
input[type=text],input[type=tel],input[type=password],input[type=number],textarea,select{
  width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 12px;
  font-size:14px;font-family:inherit;background:#fafafa;outline:none;transition:border .15s;}
input:focus,textarea:focus,select:focus{border-color:var(--red);background:#fff;}
textarea{resize:vertical;min-height:60px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:600;}
.btn-group{display:flex;flex-wrap:wrap;gap:8px;}
.btn-opt{padding:8px 14px;border:1.5px solid #ddd;border-radius:8px;background:#fff;
  font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;color:#444;text-align:left;}
.btn-opt:hover{border-color:var(--red);color:var(--red);}
.btn-opt.selected{background:var(--red);border-color:var(--red);color:#fff;font-weight:700;}
.origin-badge{display:inline-block;font-size:11px;background:#f0f0f0;color:#666;border-radius:4px;padding:1px 6px;margin-left:5px;}
.btn-opt.selected .origin-badge{background:rgba(255,255,255,.25);color:#fff;}

/* ── 주문 페이지 ── */
.product-builder{background:#fff8f8;border:1.5px dashed #e8a0a0;border-radius:12px;padding:16px;margin-bottom:16px;}
.builder-step-title{font-size:12px;font-weight:700;color:var(--red);margin-bottom:8px;}
.builder-step{margin-bottom:14px;}
.qty-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
.qty-row label{font-size:13px;color:#555;white-space:nowrap;}
.qty-input{width:70px!important;text-align:center;}
.weight-select{flex:1;}
.add-btn{width:100%;padding:12px;background:var(--red);color:#fff;border:none;
  border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;font-family:inherit;}
.add-btn:hover{background:var(--red2);}
.add-btn:disabled{background:#ccc;cursor:not-allowed;}
.cart-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;
  display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.cart-item-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.cart-item-detail{font-size:12px;color:var(--muted);}
.cart-item-del{background:none;border:none;color:#bbb;cursor:pointer;font-size:20px;padding:0 0 0 10px;line-height:1;}
.cart-item-del:hover{color:var(--red);}
.empty-cart{text-align:center;color:#aaa;font-size:13px;padding:20px;}
.submit-btn{width:100%;padding:15px;background:#222;color:#fff;border:none;
  border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;}
.submit-btn:hover{background:#111;}
.submit-btn:disabled{background:#ccc;cursor:not-allowed;}
.notice{font-size:12px;color:#aaa;text-align:center;margin-top:12px;line-height:1.7;}
.price-summary{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.price-row{display:flex;justify-content:space-between;font-size:14px;padding:5px 0;}
.price-row.total{font-size:16px;font-weight:700;border-top:1px solid var(--border);margin-top:6px;padding-top:10px;}
.price-row.delivery{color:var(--muted);}
.price-row.free{color:#1D9E75;}
.price-row .amt{font-weight:500;}
.success-screen{text-align:center;padding:60px 20px;}
.success-icon{font-size:52px;margin-bottom:16px;}
.success-title{font-size:22px;font-weight:700;margin-bottom:8px;}
.success-msg{font-size:14px;color:#666;line-height:1.7;}
.admin-link-wrap{text-align:right;margin-bottom:12px;}
.admin-link-wrap button{background:none;border:none;font-size:12px;color:#ccc;cursor:pointer;font-family:inherit;}
.admin-link-wrap button:hover{color:#888;}

/* ── 관리자 페이지 ── */
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.admin-header h1{font-size:18px;}
.admin-tabs{display:flex;gap:8px;margin-bottom:16px;}
.tab-btn{padding:8px 16px;border:1.5px solid #ddd;border-radius:8px;background:#fff;
  font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;color:#666;}
.tab-btn.active{background:var(--red);border-color:var(--red);color:#fff;}

/* 품목 관리 테이블 */
.item-row{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;
  margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.item-row.inactive{opacity:.45;}
.item-row-drag{cursor:grab;color:#ccc;font-size:18px;user-select:none;flex-shrink:0;}
.item-row-drag:active{cursor:grabbing;}
.item-row-info{flex:1;min-width:0;}
.item-row-name{font-size:14px;font-weight:700;}
.item-row-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.toggle-switch{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#ddd;border-radius:24px;cursor:pointer;transition:.2s;}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.toggle-switch input:checked+.toggle-slider{background:var(--red);}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(20px);}
.del-btn{background:none;border:none;color:#ddd;cursor:pointer;font-size:18px;flex-shrink:0;font-family:inherit;}
.del-btn:hover{color:var(--red);}

/* 카테고리 섹션 */
.cat-section{margin-bottom:24px;}
.cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cat-title{font-size:15px;font-weight:700;}
.cat-badge{font-size:12px;background:#f0f0f0;color:#666;border-radius:6px;padding:2px 8px;}

/* 신규 추가 폼 */
.add-form{background:#fff;border:1.5px dashed #ddd;border-radius:12px;padding:16px;margin-bottom:16px;}
.add-form-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--red);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.add-form-btn{padding:10px 20px;background:var(--red);color:#fff;border:none;border-radius:8px;
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.add-form-btn:hover{background:var(--red2);}
.save-notice{text-align:center;font-size:13px;color:#888;padding:8px;background:#f9f9f9;border-radius:8px;}
.big-save-btn{width:100%;padding:14px;background:#222;color:#fff;border:none;border-radius:12px;
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;}
.big-save-btn:hover{background:#111;}
</style>
</head>
<body>

<!-- ══════════════ 주문 페이지 ══════════════ -->
<div id="orderPage" class="page">
  <div class="admin-link-wrap">
    <button onclick="showAdminLogin()">관리자</button>
  </div>
  <h1>동부축산유통</h1>
  <p class="sub">주문서를 작성해 주세요</p>

  <div class="section-label">주문자 정보</div>
  <div class="card">
    <div class="field"><label>받는 분 성함 *</label><input type="text" id="name" placeholder="홍길동"></div>
    <div class="field"><label>연락처 *</label><input type="tel" id="phone" placeholder="010-0000-0000"></div>
    <div class="field"><label>배송지 주소 *</label><textarea id="address" placeholder="도로명 주소 + 상세주소"></textarea></div>
    <div class="field"><label>입금자명 *</label><input type="text" id="depositor" placeholder="입금하실 분 이름"></div>
  </div>

  <div class="section-label">상품 선택</div>
  <div class="product-builder">
    <div class="builder-step" id="step1">
      <div class="builder-step-title">1단계 — 축종 선택</div>
      <div class="btn-group" id="catBtns"></div>
    </div>
    <div class="builder-step hidden" id="step2">
      <div class="builder-step-title">2단계 — 부위 선택</div>
      <div class="btn-group" id="partBtns"></div>
    </div>
    <div class="builder-step hidden" id="step3">
      <div class="builder-step-title">3단계 — 용도 선택</div>
      <div class="btn-group" id="useBtns"></div>
    </div>
    <div class="builder-step hidden" id="step4">
      <div class="builder-step-title">4단계 — 중량 &amp; 수량</div>
      <div style="margin-bottom:10px;">
        <div style="font-size:12px;color:#666;margin-bottom:6px;font-weight:600;">중량</div>
        <div class="btn-group" id="weightBtns"></div>
      </div>
      <div class="qty-row">
        <label>수량</label>
        <input type="number" id="qtyInput" class="qty-input" value="1" min="1">
        <span style="font-size:13px;color:#888;">개</span>
      </div>
    </div>
    <button class="add-btn" id="addBtn" onclick="addToCart()" disabled>장바구니에 담기 +</button>
  </div>

  <div class="section-label">담은 상품 <span id="cartCount" style="color:var(--red);"></span></div>
  <div id="cartList"><div class="empty-cart">아직 담은 상품이 없습니다</div></div>

  <div class="price-summary hidden" id="priceSummary">
    <div class="price-row"><span>상품 합계</span><span class="amt" id="subtotalAmt">0원</span></div>
    <div class="price-row delivery" id="deliveryRow"><span>택배비</span><span class="amt" id="deliveryAmt">4,000원</span></div>
    <div class="price-row total"><span>최종 결제금액</span><span class="amt" id="totalAmt" style="color:var(--red);">0원</span></div>
    <div id="freeDeliveryNotice" class="hidden" style="font-size:12px;color:#1D9E75;text-align:right;margin-top:4px;">🎉 10만원 이상 무료배송 적용!</div>
    <div id="freeDeliveryProgress" style="font-size:12px;color:#aaa;text-align:right;margin-top:4px;"></div>
  </div>

  <div class="card" style="margin-top:16px;">
    <div class="field"><label>요청사항 (선택)</label><textarea id="memo" placeholder="배송 요청사항, 손질 방법 등"></textarea></div>
  </div>

  <button class="submit-btn" onclick="submitOrder()">주문 접수하기</button>
  <p class="notice">주문 접수 후 담당자가 입금 안내 연락드립니다</p>
</div>

<!-- 완료 -->
<div id="successPage" class="page hidden">
  <div class="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">주문이 접수되었습니다</div>
    <div class="success-msg" id="successMsg"></div>
  </div>
</div>

<!-- ══════════════ 관리자 로그인 ══════════════ -->
<div id="adminLogin" class="page hidden">
  <h1 style="margin-bottom:24px;">관리자 로그인</h1>
  <div class="card">
    <div class="field"><label>비밀번호</label><input type="password" id="adminPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')adminLogin()"></div>
    <button class="submit-btn" onclick="adminLogin()">로그인</button>
  </div>
  <div style="text-align:center;margin-top:12px;">
    <button onclick="showPage('orderPage')" style="background:none;border:none;font-size:13px;color:#aaa;cursor:pointer;">← 주문 페이지로</button>
  </div>
</div>

<!-- ══════════════ 관리자 페이지 ══════════════ -->
<div id="adminPage" class="page hidden">
  <div class="admin-header">
    <h1>품목 관리</h1>
    <button onclick="logout()" style="background:none;border:none;font-size:13px;color:#aaa;cursor:pointer;font-family:inherit;">로그아웃</button>
  </div>

  <div class="admin-tabs">
    <button class="tab-btn active" onclick="switchTab('manageTab',this)">품목 관리</button>
    <button class="tab-btn" onclick="switchTab('addTab',this)">신규 추가</button>
  </div>

  <!-- 품목 관리 탭 -->
  <div id="manageTab">
    <p class="save-notice" style="margin-bottom:12px;">토글로 품목 활성/비활성 · 드래그로 순서 변경</p>
    <div id="adminCatSections"></div>
    <button class="big-save-btn" onclick="saveToStorage()">💾 변경사항 저장</button>
  </div>

  <!-- 신규 추가 탭 -->
  <div id="addTab" class="hidden">
    <div class="add-form">
      <div class="add-form-title">새 품목 추가</div>
      <div class="form-row">
        <div class="field" style="margin:0;">
          <label>축종 *</label>
          <select id="newCat">
            <option value="돼지고기">돼지고기</option>
            <option value="소고기">소고기</option>
            <option value="양고기">양고기</option>
            <option value="염소">염소</option>
            <option value="가공품">가공품</option>
          </select>
        </div>
        <div class="field" style="margin:0;">
          <label>보관 *</label>
          <select id="newStorage">
            <option value="냉장">냉장</option>
            <option value="냉동">냉동</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="field" style="margin:0;">
          <label>품명 *</label>
          <input type="text" id="newName" placeholder="예: 삼겹살">
        </div>
        <div class="field" style="margin:0;">
          <label>원산지 *</label>
          <input type="text" id="newOrigin" placeholder="예: 국내산">
        </div>
      </div>
      <div class="field">
        <label>용도 * (쉼표로 구분)</label>
        <input type="text" id="newUses" placeholder="예: 구이,보쌈,찌개">
      </div>
      <div class="field">
        <label>중량 옵션 * (쉼표로 구분)</label>
        <input type="text" id="newWeights" placeholder="예: 500g,1kg,2kg,3kg">
      </div>
      <div class="field">
        <label>100g당 단가 (원, 선택)</label>
        <input type="number" id="newPrice" placeholder="예: 2500 (나중에 설정해도 됨)">
      </div>
      <button class="add-form-btn" onclick="addNewItem()">+ 품목 추가</button>
    </div>
    <button class="big-save-btn" onclick="saveToStorage()">💾 변경사항 저장</button>
  </div>
</div>

<script>
/* ══ 기본 데이터 ══ */
const DEFAULT_WEIGHTS = ['500g','1kg','2kg','3kg'];
const DEFAULT_ITEMS = [
  {cat:'돼지고기',storage:'냉장',name:'삼겹살',uses:['구이','보쌈','찌개','제육'],origin:'국내산',active:true,order:0,weights:['500g','1kg','2kg','3kg']},
  {cat:'돼지고기',storage:'냉장',name:'오겹살',uses:['구이','보쌈','찌개','제육'],origin:'국내산',active:true,order:1,weights:['500g','1kg','2kg','3kg']},
  {cat:'돼지고기',storage:'냉장',name:'목살',uses:['구이','보쌈','찌개','제육'],origin:'국내산',active:true,order:2,weights:['500g','1kg','2kg','3kg']},
  {cat:'돼지고기',storage:'냉장',name:'앞다리살(미전지)',uses:['구이','보쌈','찌개','제육'],origin:'국내산',active:true,order:3,weights:['500g','1kg','2kg','3kg']},
  {cat:'돼지고기',storage:'냉장',name:'등갈비',uses:['구이','찜용'],origin:'국내산',active:true,order:4,weights:['500g','1kg','2kg','3kg']},
  {cat:'돼지고기',storage:'냉장',name:'등심',uses:['돈가스','잡채','탕수육','민찌'],origin:'국내산',active:true,order:5,weights:['500g','1kg','2kg','3kg']},
  {cat:'돼지고기',storage:'냉장',name:'갈비',uses:['찜용'],origin:'국내산',active:true,order:6,weights:['500g','1kg','2kg','3kg']},
  {cat:'돼지고기',storage:'냉장',name:'흑돼지포뜬갈비',uses:['구이','찜용'],origin:'국내산',active:true,order:7,weights:['500g','1kg','2kg','3kg']},

  {cat:'돼지고기',storage:'냉장',name:'가부리살',uses:['구이','수육'],origin:'국내산',active:true,order:11,weights:['500g','1kg','2kg']},
  {cat:'돼지고기',storage:'냉장',name:'항정살',uses:['구이'],origin:'국내산',active:true,order:12,weights:['500g','1kg','2kg']},
  {cat:'돼지고기',storage:'냉동',name:'뒷다리살(후지)',uses:['장조림','탕수육','잡채','민찌'],origin:'국내산',active:true,order:13,weights:['1kg','2kg','3kg']},
  {cat:'돼지고기',storage:'냉동',name:'껍데기',uses:['구이'],origin:'국내산',active:true,order:14,weights:['500g','1kg','2kg']},
  {cat:'돼지고기',storage:'냉동',name:'등뼈',uses:['찜용','탕용'],origin:'국내산',active:true,order:15,weights:['1kg','2kg','3kg']},
  {cat:'돼지고기',storage:'냉동',name:'등심',uses:['잡채','탕수육','민찌'],origin:'국내산',active:true,order:16,weights:['500g','1kg','2kg','3kg']},
  {cat:'돼지고기',storage:'냉동',name:'갈비',uses:['찜용'],origin:'국내산',active:true,order:17,weights:['1kg','2kg','3kg']},
  {cat:'돼지고기',storage:'냉동',name:'떡갈비(8장,800g)',uses:['구이'],origin:'국내산',active:true,order:18,weights:['800g']},
  {cat:'돼지고기',storage:'냉동',name:'꽃살(턱살)',uses:['구이'],origin:'국내산',active:true,order:19,weights:['500g','1kg']},
  {cat:'돼지고기',storage:'냉동',name:'목덜미살',uses:['구이'],origin:'국내산',active:true,order:20,weights:['500g','1kg','2kg']},
  {cat:'돼지고기',storage:'냉장',name:'삼겹살',uses:['구이','보쌈','찌개','제육'],origin:'캐나다',active:true,order:21,weights:['500g','1kg','2kg','3kg']},

async function loadData(){
  document.getElementById('catBtns').innerHTML = '<span style="font-size:13px;color:#aaa;">품목 불러오는 중...</span>';
  try{
    const res = await fetch(SHEET_URL + '?action=getItems', {
      method: 'GET',
      mode: 'cors'
    });
    const json = await res.json();
    if(json.items && json.items.length > 0){
      items = json.items;
    } else {
      items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
    }
  } catch(e){
    items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
  }
  renderCatBtns();
}

async function saveToStorage(){
  const btn = document.querySelector('.big-save-btn');
  btn.textContent = '저장 중...';
  btn.disabled = true;
  try{

      method:'POST',

      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'saveItems', items})

  } catch(e){

}

function renderCatBtns(){

  const emojiMap = {돼지고기:'🐷',소고기:'🐄',양고기:'🐑',염소:'🐐',가공품:'🥩'};
  activeCats.forEach(cat=>{
    const b = document.createElement('button');
    b.className = 'btn-opt';
    b.textContent = emojiMap[cat]+' '+cat;
    b.onclick = ()=>selectCategory(cat, b);
    wrap.appendChild(b);
  });

function selectCategory(cat, btn){
  sel = {cat, part:null, use:null};
  document.querySelectorAll('#catBtns .btn-opt').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');

  const activeItems = items.filter(i=>i.cat===cat && i.active)

  const wrap = document.getElementById('partBtns');
  wrap.innerHTML='';

    const b = document.createElement('button');

    b.onclick = ()=>selectPart(item, b);

}

function selectPart(item, btn){

}

function updateAddBtn(){ document.getElementById('addBtn').disabled=!(sel.cat&&sel.part&&sel.use&&sel.weight); }

function addToCart(){
  const weight = sel.weight || '?';
  const qty = parseInt(document.getElementById('qtyInput').value)||1;
  const price100g = sel.part.price100g || 0;
  const grams = parseWeight(weight);
  const itemTotal = price100g > 0 && grams > 0 ? Math.round(price100g * (grams/100) * qty) : 0;
  cart.push({cat:sel.cat,name:sel.part.name,origin:sel.part.origin,storage:sel.part.storage,use:sel.use,weight,qty,price100g,grams,itemTotal});
  renderCart(); resetBuilder();
}

// 중량 문자열 → g 변환
function parseWeight(w){
  if(!w) return 0;
  const s = w.replace(/\s/g,'').toLowerCase();
  if(s.endsWith('kg')) return parseFloat(s)*1000;
  if(s.endsWith('g')) return parseFloat(s);
  return 0;
}

function removeCart(idx){ cart.splice(idx,1); renderCart(); }

function renderCart(){
  const list = document.getElementById('cartList');
  const count = document.getElementById('cartCount');
  const summary = document.getElementById('priceSummary');

  if(!cart.length){
    list.innerHTML='<div class="empty-cart">아직 담은 상품이 없습니다</div>';
    count.textContent='';
    summary.classList.add('hidden');
    return;
  }
  list.innerHTML=''; count.textContent=cart.length+'개';
  cart.forEach((item,idx)=>{
    const d=document.createElement('div'); d.className='cart-item';
    const priceStr = item.itemTotal > 0 ? '<span style="font-size:13px;font-weight:700;color:var(--red);">'+item.itemTotal.toLocaleString()+'원</span>' : '<span style="font-size:12px;color:#bbb;">단가 미설정</span>';
    d.innerHTML=`<div class="cart-item-info" style="flex:1;">
      <div class="cart-item-name">${item.name}<span class="origin-badge">${item.origin} ${item.storage}</span></div>
      <div class="cart-item-detail">${item.cat} · ${item.use} · ${item.weight} × ${item.qty}개</div>
      <div style="margin-top:4px;">${priceStr}</div>
    </div><button class="cart-item-del" onclick="removeCart(${idx})">×</button>`;
    list.appendChild(d);
  });
  renderPriceSummary();
  summary.classList.remove('hidden');
}

function renderPriceSummary(){
  const subtotal = cart.reduce((s,i)=>s+i.itemTotal, 0);
  const hasPricing = cart.some(i=>i.itemTotal>0);
  const delivery = subtotal >= 100000 ? 0 : 4000;
  const total = subtotal + delivery;

  document.getElementById('subtotalAmt').textContent = subtotal.toLocaleString()+'원';
  document.getElementById('totalAmt').textContent = total.toLocaleString()+'원';

  const dRow = document.getElementById('deliveryRow');
  const dAmt = document.getElementById('deliveryAmt');
  const freeNotice = document.getElementById('freeDeliveryNotice');
  const progress = document.getElementById('freeDeliveryProgress');

  if(delivery === 0){
    dAmt.textContent = '무료';
    dRow.classList.add('free'); dRow.classList.remove('delivery');
    freeNotice.classList.remove('hidden');
    progress.textContent='';
  } else {
    dAmt.textContent = '4,000원';
    dRow.classList.add('delivery'); dRow.classList.remove('free');
    freeNotice.classList.add('hidden');
    if(hasPricing){
      const remain = (100000 - subtotal).toLocaleString();
      progress.textContent = remain+'원 더 담으면 무료배송!';
    } else {
      progress.textContent='';
    }
  }
}

function resetBuilder(){
  sel={cat:null,part:null,use:null,weight:null};
  document.querySelectorAll('.btn-opt').forEach(b=>b.classList.remove('selected'));
  hide('step2');hide('step3');hide('step4');
  document.getElementById('weightBtns').innerHTML='';
  document.getElementById('qtyInput').value='1';
  updateAddBtn();
}



async function submitOrder(){
  const name=document.getElementById('name').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const address=document.getElementById('address').value.trim();
  const depositor=document.getElementById('depositor').value.trim();
  const memo=document.getElementById('memo').value.trim();
  if(!name||!phone||!address||!depositor){alert('주문자 정보를 모두 입력해 주세요.');return;}
  if(!cart.length){alert('상품을 하나 이상 담아주세요.');return;}
  const subtotal = cart.reduce((s,i)=>s+i.itemTotal, 0);
  const delivery = subtotal >= 100000 ? 0 : 4000;
  const total = subtotal + delivery;
  const itemsText=cart.map(i=>`${i.cat}/${i.name}(${i.origin},${i.storage})/${i.use}/${i.weight}×${i.qty}개`).join(' | ');
  const payload={action:'saveOrder',name,phone,address,depositor,items:itemsText,memo,subtotal,delivery,total,timestamp:new Date().toLocaleString('ko-KR')};
  try{
    await fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  }catch(e){}
  const totalStr = total > 0 ? `<br><br>결제금액: <b>${total.toLocaleString()}원</b> (택배비 ${delivery===0?'무료':delivery.toLocaleString()+'원 포함'})` : '';
  showPage('successPage');
  document.getElementById('successMsg').innerHTML=`<b>${name}</b>님의 주문이 접수되었습니다.${totalStr}<br><br>입금 확인 후 작업이 진행됩니다.<br>감사합니다 🙏<br><br><a href="https://open.kakao.com/o/gUTDi4oi" target="_blank" style="display:inline-block;margin-top:8px;padding:12px 24px;background:#FEE500;color:#3C1E1E;border-radius:10px;font-size:15px;font-weight:700;text-decoration:none;">💬 동부축산유통 카카오 오픈채팅 참여하기</a><br><span style="font-size:12px;color:#aaa;margin-top:6px;display:block;">입금 계좌는 오픈채팅방에서 확인할 수 있습니다. 기타 궁금한 점 있으시면 오픈채팅으로 문의해주세요</span>`;
}

        <span style="font-size:11px;color:#aaa;white-space:nowrap;">중량</span>
        <input type="text" value="${weights}"
          style="font-size:12px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;background:#fafafa;width:100%;font-family:inherit;"
          placeholder="예: 500g,1kg,2kg"
          onchange="updateWeights(${globalIdx}, this.value)"
          onclick="event.stopPropagation()">
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:5px;">
        <span style="font-size:11px;color:#aaa;white-space:nowrap;">100g당</span>
        <input type="number" value="${price}"
          style="font-size:12px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;background:#fafafa;width:100%;font-family:inherit;"
          placeholder="단가(원) 예: 2500"
          onchange="updatePrice(${globalIdx}, this.value)"
          onclick="event.stopPropagation()">
        <span style="font-size:11px;color:#aaa;white-space:nowrap;">원</span>
      </div>
    </div>
    <label class="toggle-switch" style="flex-shrink:0;">
      <input type="checkbox" ${item.active?'checked':''} onchange="toggleItem(${globalIdx},this.checked)">
      <span class="toggle-slider"></span>
    </label>
    <button class="del-btn" onclick="deleteItem(${globalIdx})" style="flex-shrink:0;">🗑</button>`;
  return row;
}

function updateWeights(idx, val){
  items[idx].weights = val.split(',').map(w=>w.trim()).filter(Boolean);
}

function updatePrice(idx, val){
  items[idx].price100g = parseInt(val) || 0;
}

function toggleItem(idx, val){
  items[idx].active = val;
  renderAdmin();
}

function deleteItem(idx){
  if(!confirm(items[idx].name+' 을(를) 삭제하시겠습니까?')) return;
  items.splice(idx,1);
  renderAdmin();
}

/* ══ 드래그 앤 드롭 순서 변경 ══ */
function enableDrag(list, cat){
  let dragSrc = null;
  list.querySelectorAll('.item-row').forEach(row=>{
    row.addEventListener('dragstart', e=>{ dragSrc=row; row.style.opacity='.4'; e.dataTransfer.effectAllowed='move'; });
    row.addEventListener('dragend', e=>{ row.style.opacity=''; });
    row.addEventListener('dragover', e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; });
    row.addEventListener('dragenter', e=>{ if(row!==dragSrc) row.style.background='#fff0f0'; });
    row.addEventListener('dragleave', e=>{ row.style.background=''; });
    row.addEventListener('drop', e=>{
      e.preventDefault(); row.style.background='';
      if(dragSrc===row) return;
      const rows = [...list.querySelectorAll('.item-row')];
      const fromIdx = rows.indexOf(dragSrc);
      const toIdx = rows.indexOf(row);
      if(fromIdx<toIdx) list.insertBefore(dragSrc, row.nextSibling);
      else list.insertBefore(dragSrc, row);
      // order 재계산
      const catItems = [...list.querySelectorAll('.item-row')];
      catItems.forEach((r,i)=>{ items[parseInt(r.dataset.idx)].order=i; });
      renderAdmin();
    });
  });
}

/* ══ 신규 품목 추가 ══ */
function addNewItem(){
  const cat = document.getElementById('newCat').value;
  const storage = document.getElementById('newStorage').value;
  const name = document.getElementById('newName').value.trim();
  const origin = document.getElementById('newOrigin').value.trim();
  const usesRaw = document.getElementById('newUses').value.trim();
  const weightsRaw = document.getElementById('newWeights').value.trim();
  const price100g = parseInt(document.getElementById('newPrice').value) || 0;
  if(!name||!origin||!usesRaw||!weightsRaw){ alert('모든 항목을 입력해 주세요.'); return; }
  const uses = usesRaw.split(',').map(u=>u.trim()).filter(Boolean);
  const weights = weightsRaw.split(',').map(w=>w.trim()).filter(Boolean);
  const catItems = items.filter(i=>i.cat===cat);
  const maxOrder = catItems.length ? Math.max(...catItems.map(i=>i.order))+1 : 0;
  items.push({cat,storage,name,uses,origin,active:true,order:maxOrder,weights,price100g});
  ['newName','newOrigin','newUses','newWeights','newPrice'].forEach(id=>document.getElementById(id).value='');
  alert(name+' 품목이 추가되었습니다.\n저장 버튼을 눌러 저장해 주세요.');
  renderAdmin();
  switchTab('manageTab', document.querySelectorAll('.tab-btn')[0]);
}

/* ══ 유틸 ══ */
function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }

/* ══ 초기화 ══ */
loadData();
</script>
